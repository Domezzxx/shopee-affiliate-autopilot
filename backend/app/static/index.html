<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliate Autopilot — Shopee Food</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div class="brand">🍜 Affiliate Autopilot <span class="tag">Shopee Food</span></div>
    <div class="actions">
      <div class="act-group primary-actions">
        <button id="btn-system" class="sys" title="เปิด/ปิดระบบอัตโนมัติ">● ระบบ</button>
        <button id="btn-autopilot" class="sys" title="Auto-Pilot: ประมวลผลร้านใหม่เองตามรอบ">🤖 Auto</button>
        <button id="btn-open-chrome" class="go" style="background: #e67e22; border-color: #e67e22; color: white; font-weight: 600;" title="เปิดเบราว์เซอร์ Chrome สำหรับบอท Google Flow">🌐 เปิด Google Flow</button>
        <button id="btn-scrape" class="go" title="ดึงสินค้า Shopee ตามคำค้นใน .env">🔍 ดึงสินค้า</button>
        <button id="btn-add" class="go">+ เพิ่มร้าน</button>
        <button id="btn-runall" class="primary">▶ รันครบวง</button>
      </div>
      <details class="more-menu">
        <summary>เครื่องมือ ▾</summary>
        <div class="more-panel">
          <button id="btn-preflight">🚦 เช็คพร้อมโพสต์</button>
          <button id="btn-opt">⚙ Auto-optimize</button>
          <button id="btn-sim">🎲 จำลองผล (เดโม)</button>
        </div>
      </details>
    </div>
  </header>

  <div id="banner"></div>
  <div id="progress" class="hidden"></div>
  <section class="kpis" id="kpis"></section>

  <nav class="tabs">
    <button data-tab="stores" class="active">ร้านค้า</button>
    <button data-tab="content">คอนเทนต์ A/B</button>
    <button data-tab="posts">โพสต์</button>
    <button data-tab="platform">ช่องทาง</button>
    <button data-tab="report">📊 รายงาน</button>
    <button data-tab="insights">🧠 การเรียนรู้</button>
    <button data-tab="promo">🖼️ ภาพโปรโมท</button>
    <button data-tab="flowvids">🎬 วิดีโอ Flow</button>
    <button data-tab="flow">Flow ระบบ</button>
  </nav>

  <main>
    <div class="panel" id="tab-stores"></div>
    <div class="panel hidden" id="tab-content">
      <div class="filter-toolbar">
        <label>📅 เดือน/ปี: <input type="month" id="content-filter-month" /></label>
        <label>📱 ช่องทาง: 
          <select id="content-filter-platform">
            <option value="">ทุกช่องทาง</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
          </select>
        </label>
        <button id="btn-content-filter-clear" class="go" style="background:#2a2f3a; border-color:var(--line); color:var(--txt);">ล้างตัวกรอง</button>
      </div>
      <div id="content-list"></div>
    </div>
    <div class="panel hidden" id="tab-posts">
      <div class="filter-toolbar">
        <label>📅 เดือน/ปี: <input type="month" id="posts-filter-month" /></label>
        <label>📆 วันที่เจาะจง: <input type="date" id="posts-filter-date" /></label>
        <label>📱 ช่องทาง: 
          <select id="posts-filter-platform">
            <option value="">ทุกช่องทาง</option>
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="youtube">YouTube</option>
          </select>
        </label>
        <label>🚦 สถานะ: 
          <select id="posts-filter-status">
            <option value="">ทุกสถานะ</option>
            <option value="posted">posted</option>
            <option value="queued">queued</option>
            <option value="failed">failed</option>
          </select>
        </label>
        <button id="btn-posts-filter-clear" class="go" style="background:#2a2f3a; border-color:var(--line); color:var(--txt);">ล้างตัวกรอง</button>
      </div>
      <div id="posts-table-wrap"></div>
    </div>
    <div class="panel hidden" id="tab-platform"></div>
    <div class="panel hidden" id="tab-report"></div>
    <div class="panel hidden" id="tab-insights"></div>
    <div class="panel hidden" id="tab-promo"></div>
    <div class="panel hidden" id="tab-flowvids"></div>
    <div class="panel hidden" id="tab-flow"></div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modal-title">รายละเอียด</h3>
        <button class="modal-close" data-close aria-label="ปิด">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-foot">
        <button class="primary" data-close>ปิด</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
